<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ice Cream Paradise</title>

    <style>
      body {
        margin: 0;
        font-family: Arial;
        background: #fff5f7;
      }

      /* Header */
      header {
        background: #ff6b81;
        color: white;
        text-align: center;
        padding: 20px;
      }

      /* Top ice cream banner */
      .hero {
        background-image: url("https://images.unsplash.com/photo-1501443762994-82bd5dace89a");
        height: 350px;
        background-size: cover;
        background-position: center;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 40px;
        font-weight: bold;
        text-shadow: 2px 2px 8px black;
      }

      /* Cards */
      .container {
        text-align: center;
        padding: 40px;
      }

      .grid {
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
      }

      .card {
        width: 200px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        transition: 0.3s;
      }

      .card:hover {
        transform: scale(1.08);
      }

      .card img {
        width: 100%;
        border-radius: 10px 10px 0 0;
      }

      footer {
        background: #ff6b81;
        color: white;
        text-align: center;
        padding: 15px;
      }
    </style>
  </head>

  <body>
    <header>
      <h1>🍦 Ice Cream Paradise</h1>
    </header>

    <!-- TOP ICE CREAM IMAGE -->
    <div class="hero">Delicious Ice Cream</div>

    <div class="container">
      <h2>Our Flavours</h2>

      <div class="grid">
        <div class="card">
          <img
            src="https://images.unsplash.com/photo-1563805042-7684c019e1cb"
          />
          <h3>Vanilla</h3>
        </div>

        <div class="card">
          <img
            src="https://images.unsplash.com/photo-1570197788417-0e82375c9371"
          />
          <h3>Chocolate</h3>
        </div>

        <div class="card">
          <img
            src="https://images.unsplash.com/photo-1567206563064-6f60f40a2b57"
          />
          <h3>Strawberry</h3>
        </div>
      </div>
    </div>

    <footer>
      <p>© 2026 Ice Cream Paradise</p>
    </footer>
  </body>
</html>
